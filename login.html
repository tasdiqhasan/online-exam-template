<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login | Online Exam Platform</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&amp;family=Lexend:wght@300;400;500;600&amp;display=swap"

    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#004ac6",
                        "on-background": "#191c1e",
                        "tertiary-fixed-dim": "#ffb596",
                        "surface-variant": "#e0e3e5",
                        "primary-fixed-dim": "#b4c5ff",
                        "on-primary-fixed-variant": "#003ea8",
                        "surface-container-high": "#e6e8ea",
                        "on-secondary-fixed-variant": "#3a485b",
                        "tertiary-container": "#bc4800",
                        "surface-bright": "#f7f9fb",
                        "outline": "#737686",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "tertiary": "#943700",
                        "background": "#f7f9fb",
                        "secondary": "#515f74",
                        "surface-container": "#eceef0",
                        "on-primary": "#ffffff",
                        "inverse-primary": "#b4c5ff",
                        "surface-container-low": "#f2f4f6",
                        "on-secondary-container": "#57657a",
                        "secondary-fixed-dim": "#b9c7df",
                        "primary-fixed": "#dbe1ff",
                        "tertiary-fixed": "#ffdbcd",
                        "surface-container-highest": "#e0e3e5",
                        "inverse-surface": "#2d3133",
                        "on-secondary-fixed": "#0d1c2e",
                        "outline-variant": "#c3c6d7",
                        "on-error-container": "#93000a",
                        "inverse-on-surface": "#eff1f3",
                        "on-error": "#ffffff",
                        "error": "#ba1a1a",
                        "on-surface": "#191c1e",
                        "on-tertiary-fixed": "#360f00",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#ffede6",
                        "error-container": "#ffdad6",
                        "secondary-container": "#d5e3fc",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#434655",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed": "#00174b",
                        "on-primary-container": "#eeefff",
                        "primary-container": "#2563eb",
                        "surface-tint": "#0053db",
                        "surface-dim": "#d8dadc",
                        "surface": "#f7f9fb",
                        "secondary-fixed": "#d5e3fc"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "touch-target": "44px",
                        "gutter": "24px",
                        "container-max-width": "800px",
                        "section-gap": "48px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "display": ["Public Sans"],
                        "label-bold": ["Public Sans"],
                        "button": ["Public Sans"],
                        "label-sm": ["Public Sans"],
                        "question-text": ["Lexend"],
                        "h1": ["Public Sans"],
                        "h2": ["Public Sans"],
                        "body": ["Lexend"]
                    },
                    "fontSize": {
                        "display": ["40px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "label-bold": ["14px", { "lineHeight": "1", "fontWeight": "600" }],
                        "button": ["16px", { "lineHeight": "1", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "1", "fontWeight": "500" }],
                        "question-text": ["20px", { "lineHeight": "1.6", "letterSpacing": "-0.01em", "fontWeight": "400" }],
                        "h1": ["32px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "h2": ["24px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "body": ["16px", { "lineHeight": "1.6", "fontWeight": "300" }]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .login-card {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
    </style>
</head>

<body class="bg-background font-body text-on-background min-h-screen flex flex-col">
    <main class="flex-grow flex items-center justify-center px-gutter py-section-gap">
        <div class="w-full max-w-[440px] flex flex-col gap-base">
            <div class="mb-gutter text-center">
                <div class="flex justify-center mb-4">
                    <div class="bg-primary-fixed p-3 rounded-xl">
                        <span class="material-symbols-outlined text-primary text-4xl" data-icon="school">school</span>
                    </div>
                </div>
                <h1 class="font-h1 text-h1 text-on-surface mb-2">Online Exam</h1>
                <p class="font-body text-body text-on-surface-variant">Sign in to access your examinations</p>
            </div>
            <div class="login-card bg-surface-container-lowest border border-surface-variant p-8 md:p-10 rounded-xl">
                <form class="flex flex-col gap-6">
                    <div class="flex flex-col gap-2">
                        <label class="font-label-bold text-label-bold text-on-surface-variant" for="username">Email or
                            Username</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]"
                                data-icon="person">person</span>
                            <input
                                class="w-full h-touch-target pl-10 pr-4 bg-white border border-outline-variant rounded-lg focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-outline/50"
                                id="username" name="username" placeholder="name@example.com" required="" type="text" />
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <div class="flex justify-between items-center">
                            <label class="font-label-bold text-label-bold text-on-surface-variant"
                                for="password">Password</label>
                            <a class="font-label-sm text-label-sm text-primary hover:underline transition-all"
                                href="#">Forgot Password?</a>
                        </div>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]"
                                data-icon="lock">lock</span>
                            <input
                                class="w-full h-touch-target pl-10 pr-10 bg-white border border-outline-variant rounded-lg focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-outline/50"
                                id="password" name="password" placeholder="••••••••" required="" type="password" />
                            <button
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant"
                                type="button">
                                <span class="material-symbols-outlined text-[20px]"
                                    data-icon="visibility">visibility</span>
                            </button>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <input
                            class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary transition-colors cursor-pointer"
                            id="remember" name="remember" type="checkbox" />
                        <label class="font-label-sm text-label-sm text-on-surface-variant cursor-pointer select-none"
                            for="remember">Remember me</label>
                    </div>
                    <a
                        class="w-full h-touch-target bg-primary text-on-primary font-button text-button rounded-lg hover:bg-surface-tint active:scale-[0.98] transition-all flex items-center justify-center gap-2"
                        href="welcome.html">
                        Login
                        <span class="material-symbols-outlined text-[20px]" data-icon="login">login</span>
                    </a>
                </form>
                <div class="mt-8 pt-8 border-t border-surface-variant">
                    <div class="flex flex-col gap-4">
                        <p class="text-center font-label-sm text-label-sm text-outline">Alternatively, sign in with</p>
                        <button
                            class="h-touch-target border border-outline-variant rounded-lg flex items-center justify-center gap-2 hover:bg-surface-container transition-colors font-label-bold text-on-surface">
                            <img alt="Google Logo" class="w-5 h-5"
                                src="https://lh3.googleusercontent.com/aida-public/AB6AXuC3qBbbME4-B6pGEr52cOJU8GzSwn_fdbqlwLT4Bm9PuTYkdvytnY4k6UNz-g7LpU4h4zogzIRD-SZuFmeaGsBGZYwKwtOBxO99xe4O9i-QHJbwgy7UHQMG60c-TCe4YEXYqZTPoHqgr6pwDW-BHX57UfBCLvtUPF1nTJ-dr6Xm2EJjMcN6ZOlRTUkQ9_koG9BVeRN_7PaqRrMhFhgTAEicIYfm4jYxlHjNg1SRBBUzL7gEcaCEtpeQzuI5Qm3yRwmMWSAB4cA7I-0" />
                            Google
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer
        class="w-full border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex flex-col md:flex-row justify-between items-center px-8 py-6">
        <p class="font-['Public_Sans'] text-xs text-slate-500">© 2026 Online Exam Platform. All rights reserved.
        </p>
        <div class="flex gap-6 mt-4 md:mt-0">
            <a class="text-slate-500 font-['Public_Sans'] text-xs hover:text-slate-900 dark:hover:text-slate-200 transition-opacity duration-300"
                href="#">Privacy Policy</a>
            <a class="text-slate-500 font-['Public_Sans'] text-xs hover:text-slate-900 dark:hover:text-slate-200 transition-opacity duration-300"
                href="#">Terms of Service</a>
        </div>
    </footer>
</body>

</html>
